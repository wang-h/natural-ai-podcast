<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ run_id }} · natural-podcast</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<div class="app-container">
  <aside class="slim-sidebar">
    <div class="vertical-text"><span>主播</span><b>林深 / 若水</b></div>
    <div class="sidebar-footer" style="padding-bottom: 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; align-items: center;">
      <a href="https://github.com/deepling-tech/natural-ai-podcast" target="_blank" style="color: var(--muted-foreground);"><i data-lucide="github"></i></a>
      <a href="/" style="color: var(--muted-foreground);"><i data-lucide="home"></i></a>
    </div>
  </aside>

  <section class="info-sidebar">
    <div class="podcast-cover-box">
      <div class="podcast-cover-content">
        <i data-lucide="waves"></i>
        <h2>Natural AI</h2>
      </div>
    </div>
    <div class="podcast-info"><h1>natural-podcast</h1></div>
    <div class="info-sections">
      <section>
        <div class="section-label"><div class="square-icon"></div> 节目详情</div>
        <div class="description-box" style="font-family:var(--font-mono); font-size:0.85rem;">ID: {{ run_id }}</div>
      </section>
      <section style="margin-top: 2.5rem;">
        <div class="section-label"><div class="square-icon" style="background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);"></div> 导航</div>
        <nav class="nav-links">
          <a href="/" class="nav-item"><i data-lucide="layout-grid"></i><span>返回列表</span></a>
          <a href="/script" class="nav-item"><i data-lucide="file-text"></i><span>Text → Script</span></a>
        </nav>
      </section>
    </div>
  </section>

  <main class="main-content">
    <div class="feature-page" style="padding: 4rem 5rem;">
      <div class="result-header" style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
        <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; margin: 0;">{{ run_id }}</h1>
        <div class="result-actions">
          {% if audio_url %}<a href="{{ audio_url }}" download class="nav-item" style="border:1px solid var(--border); background:white; padding:0.6rem 1.25rem; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:600;"><i data-lucide="download"></i> 下载 MP3</a>{% endif %}
        </div>
      </div>

      {% if audio_url %}
      <div class="player-bar" style="margin-bottom: 4rem; background: #fafafa; border-radius: 16px; padding: 2rem; border: 1px solid var(--border);">
        <audio controls style="width:100%; height:44px;"><source src="{{ audio_url }}" type="audio/mpeg"></audio>
      </div>
      {% endif %}

      <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;"><i data-lucide="scroll-text" style="color:var(--theme-blue);"></i> Script</h2>
      <div class="script-body">
        {% for l in lines %}
        <div class="line {{ 'shen' if l.speaker == '林深' else 'ruo' }}" style="padding:1.5rem 0; border-bottom:1px solid #f1f1f4; display:grid; grid-template-columns: 100px 1fr; gap:1.5rem;">
          <span class="speaker" style="font-weight:800; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted-foreground);">{{ l.speaker }}</span>
          <span class="text" style="font-size:1.1rem; line-height:1.7;">{{ l.text }}</span>
        </div>
        {% endfor %}
      </div>
    </div>
    <footer><p>natural-podcast · Powered by MiniMax TTS</p></footer>
  </main>
</div>
<script>document.addEventListener('DOMContentLoaded', function() { lucide.createIcons(); });</script>
</body>
</html>
